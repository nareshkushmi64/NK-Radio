name: NK Radio — Self-Contained Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════
  # JOB 1 — DEBUG APK  (every push / PR)
  # ════════════════════════════════════════════════
  build-debug:
    name: Generate NK Radio & Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Generate full Android project
        run: |
          echo "" | base64 -d > generate.py
          python3 generate.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Gradle wrapper
        working-directory: NKRadio
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('NKRadio/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: NKRadio
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NKRadio-debug-${{ github.run_number }}
          path: NKRadio/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ════════════════════════════════════════════════
  # JOB 2 — RELEASE APK  (main branch only)
  # ════════════════════════════════════════════════
  build-release:
    name: Generate NK Radio & Build Release APK
    runs-on: ubuntu-latest
    needs: build-debug
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Generate full Android project
        run: |
          echo "" | base64 -d > generate.py
          python3 generate.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Gradle wrapper
        working-directory: NKRadio
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('NKRadio/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Release APK
        working-directory: NKRadio
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: NKRadio/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NKRadio-release-${{ github.run_number }}
          path: NKRadio/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NKRadio/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
