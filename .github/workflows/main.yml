    # ── Model ─────────────────────────────────────────────────────────────
    w(f"{S}/model/Models.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio.model
        import com.google.gson.annotations.SerializedName

        data class RadioStation(
            @SerializedName("stationuuid") val id: String = "",
            @SerializedName("name") val name: String = "",
            @SerializedName("url") val streamUrl: String = "",
            @SerializedName("url_resolved") val resolvedUrl: String? = null,
            @SerializedName("favicon") val faviconUrl: String? = null,
            @SerializedName("country") val country: String = "",
            @SerializedName("countrycode") val countryCode: String = "",
            @SerializedName("language") val language: String = "",
            @SerializedName("tags") val tags: String = "",
            @SerializedName("votes") val votes: Int = 0,
            @SerializedName("bitrate") val bitrate: Int = 0,
            @SerializedName("codec") val codec: String = ""
        ) {
            val playableUrl get() = resolvedUrl?.takeIf { it.isNotBlank() } ?: streamUrl
            val displayBitrate get() = if (bitrate > 0) "${bitrate}kbps" else ""
            val a11yLabel get() = buildString {
                append("Station $name")
                if (country.isNotBlank()) append(", $country")
                if (language.isNotBlank()) append(", language $language")
                if (displayBitrate.isNotBlank()) append(", $displayBitrate")
            }
        }

        data class Country(
            @SerializedName("name") val name: String = "",
            @SerializedName("iso_3166_1") val code: String = "",
            @SerializedName("stationcount") val stationCount: Int = 0
        ) {
            val a11yLabel get() = "$name, $stationCount stations available"
        }

        data class PlayerState(
            val station: RadioStation? = null,
            val isPlaying: Boolean = false,
            val isLoading: Boolean = false,
            val error: String? = null
        )

        sealed class UiState<out T> {
            object Loading : UiState<Nothing>()
            data class Success<T>(val data: T) : UiState<T>()
            data class Error(val message: String) : UiState<Nothing>()
        }
    ''').lstrip('\n'))

    # ── Network ───────────────────────────────────────────────────────────
    w(f"{S}/network/RadioApi.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio.network
        import com.nareshkushmi.nkradio.model.Country
        import com.nareshkushmi.nkradio.model.RadioStation
        import retrofit2.http.*

        interface RadioApi {
            @GET("stations/search")
            suspend fun search(
                @Query("name") name: String,
                @Query("countrycode") countryCode: String = "",
                @Query("limit") limit: Int = 100,
                @Query("order") order: String = "votes",
                @Query("reverse") reverse: Boolean = true,
                @Query("hidebroken") hideBroken: Boolean = true
            ): List<RadioStation>

            @GET("stations/bycountrycodeexact/{code}")
            suspend fun byCountry(
                @Path("code") code: String,
                @Query("limit") limit: Int = 100,
                @Query("order") order: String = "votes",
                @Query("reverse") reverse: Boolean = true,
                @Query("hidebroken") hideBroken: Boolean = true
            ): List<RadioStation>

            @GET("stations/topclick/60")
            suspend fun topStations(): List<RadioStation>

            @GET("countries")
            suspend fun countries(
                @Query("order") order: String = "name",
                @Query("hidebroken") hideBroken: Boolean = true
            ): List<Country>
        }
    ''').lstrip('\n'))

    w(f"{S}/network/NetworkClient.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio.network
        import okhttp3.OkHttpClient
        import okhttp3.logging.HttpLoggingInterceptor
        import retrofit2.Retrofit
        import retrofit2.converter.gson.GsonConverterFactory
        import java.util.concurrent.TimeUnit

        object NetworkClient {
            val api: RadioApi by lazy {
                val client = OkHttpClient.Builder()
                    .connectTimeout(15, TimeUnit.SECONDS)
                    .readTimeout(20, TimeUnit.SECONDS)
                    .addInterceptor(HttpLoggingInterceptor().apply { level = HttpLoggingInterceptor.Level.BASIC })
                    .addInterceptor { chain ->
                        chain.proceed(chain.request().newBuilder()
                            .addHeader("User-Agent", "NKRadio/1.0").build())
                    }.build()
                Retrofit.Builder()
                    .baseUrl("https://de1.api.radio-browser.info/json/")
                    .client(client)
                    .addConverterFactory(GsonConverterFactory.create())
                    .build()
                    .create(RadioApi::class.java)
            }
        }
    ''').lstrip('\n'))

    # ── Repository ────────────────────────────────────────────────────────
    w(f"{S}/repository/RadioRepository.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio.repository
        import com.nareshkushmi.nkradio.model.Country
        import com.nareshkushmi.nkradio.model.RadioStation
        import com.nareshkushmi.nkradio.model.UiState
        import com.nareshkushmi.nkradio.network.NetworkClient
        import kotlinx.coroutines.Dispatchers
        import kotlinx.coroutines.withContext

        class RadioRepository {
            private val api = NetworkClient.api
            private var countriesCache: List<Country>? = null

            suspend fun topStations(): UiState<List<RadioStation>> = fetch { api.topStations() }
            suspend fun search(q: String, code: String = ""): UiState<List<RadioStation>> = fetch { api.search(q, code) }
            suspend fun byCountry(code: String): UiState<List<RadioStation>> = fetch { api.byCountry(code) }

            suspend fun countries(): UiState<List<Country>> = withContext(Dispatchers.IO) {
                countriesCache?.let { return@withContext UiState.Success(it) }
                try {
                    val list = api.countries()
                    countriesCache = list
                    UiState.Success(list)
                } catch (e: Exception) {
                    UiState.Error(e.message ?: "Failed to load countries")
                }
            }

            fun filterCountries(list: List<Country>, q: String) =
                if (q.isBlank()) list
                else list.filter { it.name.contains(q, true) || it.code.contains(q, true) }

            private suspend fun <T> fetch(block: suspend () -> T): UiState<T> =
                withContext(Dispatchers.IO) {
                    try { UiState.Success(block()) }
                    catch (e: Exception) { UiState.Error(e.message ?: "Unknown error") }
                }
        }
    ''').lstrip('\n'))

    # ── ViewModel ─────────────────────────────────────────────────────────
    w(f"{S}/viewmodel/RadioViewModel.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio.viewmodel
        import androidx.lifecycle.ViewModel
        import androidx.lifecycle.viewModelScope
        import com.nareshkushmi.nkradio.model.*
        import com.nareshkushmi.nkradio.repository.RadioRepository
        import kotlinx.coroutines.Job
        import kotlinx.coroutines.delay
        import kotlinx.coroutines.flow.MutableStateFlow
        import kotlinx.coroutines.flow.StateFlow
        import kotlinx.coroutines.flow.asStateFlow
        import kotlinx.coroutines.launch

        class RadioViewModel : ViewModel() {
            private val repo = RadioRepository()

            private val _stations = MutableStateFlow<UiState<List<RadioStation>>>(UiState.Loading)
            val stations: StateFlow<UiState<List<RadioStation>>> = _stations.asStateFlow()

            private val _countries = MutableStateFlow<List<Country>>(emptyList())
            private val _filteredCountries = MutableStateFlow<List<Country>>(emptyList())
            val filteredCountries: StateFlow<List<Country>> = _filteredCountries.asStateFlow()

            private val _player = MutableStateFlow(PlayerState())
            val player: StateFlow<PlayerState> = _player.asStateFlow()

            private val _selectedCountry = MutableStateFlow<Country?>(null)
            val selectedCountry: StateFlow<Country?> = _selectedCountry.asStateFlow()

            private var queue: List<RadioStation> = emptyList()
            private var queueIndex = -1
            private var searchJob: Job? = null

            init { loadTop(); loadCountries() }

            fun loadTop() = viewModelScope.launch {
                _stations.value = UiState.Loading
                _stations.value = repo.topStations().also {
                    if (it is UiState.Success) queue = it.data
                }
            }

            fun search(query: String) {
                searchJob?.cancel()
                if (query.isBlank()) { loadTop(); return }
                searchJob = viewModelScope.launch {
                    delay(400)
                    _stations.value = UiState.Loading
                    _stations.value = repo.search(query, _selectedCountry.value?.code ?: "").also {
                        if (it is UiState.Success) queue = it.data
                    }
                }
            }

            fun selectCountry(country: Country?) {
                _selectedCountry.value = country
                if (country == null) { loadTop(); return }
                viewModelScope.launch {
                    _stations.value = UiState.Loading
                    _stations.value = repo.byCountry(country.code).also {
                        if (it is UiState.Success) queue = it.data
                    }
                }
            }

            private fun loadCountries() = viewModelScope.launch {
                val result = repo.countries()
                if (result is UiState.Success) {
                    _countries.value = result.data
                    _filteredCountries.value = result.data
                }
            }

            fun filterCountries(q: String) {
                _filteredCountries.value = repo.filterCountries(_countries.value, q)
            }

            fun play(station: RadioStation) {
                queueIndex = queue.indexOf(station).takeIf { it >= 0 } ?: 0
                _player.value = PlayerState(station, isPlaying = true, isLoading = true)
            }

            fun togglePause() {
                _player.value = _player.value.let { it.copy(isPlaying = !it.isPlaying) }
            }

            fun next() {
                if (queue.isEmpty()) return
                queueIndex = (queueIndex + 1) % queue.size
                play(queue[queueIndex])
            }

            fun prev() {
                if (queue.isEmpty()) return
                queueIndex = if (queueIndex <= 0) queue.size - 1 else queueIndex - 1
                play(queue[queueIndex])
            }

            fun onPlayerReady() { _player.value = _player.value.copy(isLoading = false) }
            fun onPlayerError(msg: String) {
                _player.value = _player.value.copy(isLoading = false, isPlaying = false, error = msg)
            }
        }
    ''').lstrip('\n'))

    # ── PlaybackService ───────────────────────────────────────────────────
    w(f"{S}/service/RadioService.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio.service
        import androidx.media3.common.AudioAttributes
        import androidx.media3.common.C
        import androidx.media3.common.MediaItem
        import androidx.media3.common.Player
        import androidx.media3.exoplayer.ExoPlayer
        import androidx.media3.session.MediaSession
        import androidx.media3.session.MediaSessionService

        class RadioService : MediaSessionService() {
            private var mediaSession: MediaSession? = null

            override fun onCreate() {
                super.onCreate()
                val player = ExoPlayer.Builder(this)
                    .setAudioAttributes(
                        AudioAttributes.Builder()
                            .setUsage(C.USAGE_MEDIA)
                            .setContentType(C.AUDIO_CONTENT_TYPE_MUSIC)
                            .build(), true
                    )
                    .setHandleAudioBecomingNoisy(true)
                    .build()
                mediaSession = MediaSession.Builder(this, player)
                    .setCallback(object : MediaSession.Callback {})
                    .build()
            }

            override fun onGetSession(controllerInfo: MediaSession.ControllerInfo) = mediaSession

            override fun onDestroy() {
                mediaSession?.run {
                    player.release()
                    release()
                    mediaSession = null
                }
                super.onDestroy()
            }
        }
    ''').lstrip('\n'))

    # ── Theme ─────────────────────────────────────────────────────────────
    w(f"{S}/ui/theme/Theme.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio.ui.theme
        import android.app.Activity
        import android.os.Build
        import androidx.compose.foundation.isSystemInDarkTheme
        import androidx.compose.material3.*
        import androidx.compose.runtime.Composable
        import androidx.compose.runtime.SideEffect
        import androidx.compose.ui.graphics.Color
        import androidx.compose.ui.graphics.toArgb
        import androidx.compose.ui.platform.LocalContext
        import androidx.compose.ui.platform.LocalView
        import androidx.core.view.WindowCompat

        private val LightColors = lightColorScheme(
            primary = Color(0xFF1A73E8),
            onPrimary = Color.White,
            primaryContainer = Color(0xFFD3E4FF),
            secondary = Color(0xFF625B71),
            background = Color(0xFFF8F9FA),
            surface = Color(0xFFFFFFFF),
            onBackground = Color(0xFF1C1B1F),
            onSurface = Color(0xFF1C1B1F),
        )

        private val DarkColors = darkColorScheme(
            primary = Color(0xFF8AB4F8),
            onPrimary = Color(0xFF003065),
            primaryContainer = Color(0xFF00468B),
            secondary = Color(0xFFCCC2DC),
            background = Color(0xFF0E1117),
            surface = Color(0xFF1A1C23),
            onBackground = Color(0xFFE3E2E6),
            onSurface = Color(0xFFE3E2E6),
        )

        @Composable
        fun NKRadioTheme(
            darkTheme: Boolean = isSystemInDarkTheme(),
            dynamicColor: Boolean = true,
            content: @Composable () -> Unit
        ) {
            val colorScheme = when {
                dynamicColor && Build.VERSION.SDK_INT >= Build.VERSION_CODES.S -> {
                    val context = LocalContext.current
                    if (darkTheme) dynamicDarkColorScheme(context) else dynamicLightColorScheme(context)
                }
                darkTheme -> DarkColors
                else -> LightColors
            }

            val view = LocalView.current
            if (!view.isInEditMode) {
                SideEffect {
                    val window = (view.context as Activity).window
                    window.statusBarColor = colorScheme.background.toArgb()
                    WindowCompat.getInsetsController(window, view).isAppearanceLightStatusBars = !darkTheme
                }
            }

            MaterialTheme(colorScheme = colorScheme, content = content)
        }
    ''').lstrip('\n'))

    # ── Screens ───────────────────────────────────────────────────────────
    w(f"{S}/ui/screen/HomeScreen.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio.ui.screen
        import androidx.compose.animation.*
        import androidx.compose.animation.core.*
        import androidx.compose.foundation.background
        import androidx.compose.foundation.clickable
        import androidx.compose.foundation.layout.*
        import androidx.compose.foundation.lazy.LazyColumn
        import androidx.compose.foundation.lazy.items
        import androidx.compose.foundation.shape.CircleShape
        import androidx.compose.foundation.shape.RoundedCornerShape
        import androidx.compose.material.icons.Icons
        import androidx.compose.material.icons.filled.*
        import androidx.compose.material.icons.rounded.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Alignment
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.draw.clip
        import androidx.compose.ui.graphics.Color
        import androidx.compose.ui.layout.ContentScale
        import androidx.compose.ui.platform.LocalContext
        import androidx.compose.ui.semantics.*
        import androidx.compose.ui.text.font.FontWeight
        import androidx.compose.ui.text.style.TextOverflow
        import androidx.compose.ui.unit.dp
        import androidx.compose.ui.unit.sp
        import coil.compose.AsyncImage
        import coil.request.ImageRequest
        import com.nareshkushmi.nkradio.model.*

        @OptIn(ExperimentalMaterial3Api::class)
        @Composable
        fun HomeScreen(
            stationsState: UiState<List<RadioStation>>,
            playerState: PlayerState,
            selectedCountry: Country?,
            onSearch: (String) -> Unit,
            onSelectCountry: () -> Unit,
            onPlay: (RadioStation) -> Unit,
            onTogglePause: () -> Unit,
            onNext: () -> Unit,
            onPrev: () -> Unit
        ) {
            var searchQuery by remember { mutableStateOf("") }

            Scaffold(
                topBar = {
                    Column(modifier = Modifier
                        .fillMaxWidth()
                        .background(MaterialTheme.colorScheme.surface)
                        .padding(horizontal = 16.dp, vertical = 8.dp)
                    ) {
                        Text(
                            text = "NK Radio",
                            style = MaterialTheme.typography.headlineMedium.copy(fontWeight = FontWeight.Bold),
                            color = MaterialTheme.colorScheme.primary,
                            modifier = Modifier.padding(bottom = 12.dp)
                        )
                        // Search bar
                        OutlinedTextField(
                            value = searchQuery,
                            onValueChange = { searchQuery = it; onSearch(it) },
                            placeholder = { Text("Search radio stations worldwide…") },
                            leadingIcon = { Icon(Icons.Rounded.Search, contentDescription = null) },
                            trailingIcon = {
                                if (searchQuery.isNotEmpty()) {
                                    IconButton(onClick = { searchQuery = ""; onSearch("") }) {
                                        Icon(Icons.Rounded.Close, contentDescription = "Clear search")
                                    }
                                }
                            },
                            shape = RoundedCornerShape(28.dp),
                            modifier = Modifier
                                .fillMaxWidth()
                                .semantics { contentDescription = "Search radio stations. Type to search." },
                            singleLine = true
                        )
                        Spacer(Modifier.height(8.dp))
                        // Country chip
                        FilterChip(
                            selected = selectedCountry != null,
                            onClick = onSelectCountry,
                            label = { Text(selectedCountry?.name ?: "All Countries") },
                            leadingIcon = { Icon(Icons.Rounded.Language, contentDescription = null, modifier = Modifier.size(18.dp)) },
                            trailingIcon = if (selectedCountry != null) {
                                { Icon(Icons.Rounded.Close, contentDescription = "Clear country filter", modifier = Modifier.size(16.dp)) }
                            } else null,
                            modifier = Modifier.semantics {
                                contentDescription = if (selectedCountry != null)
                                    "Country filter: ${selectedCountry.name}. Tap to change."
                                else "Select country to filter stations. Tap to open."
                            }
                        )
                    }
                },
                bottomBar = {
                    AnimatedVisibility(
                        visible = playerState.station != null,
                        enter = slideInVertically { it },
                        exit = slideOutVertically { it }
                    ) {
                        playerState.station?.let {
                            NowPlayingBar(
                                state = playerState,
                                onTogglePause = onTogglePause,
                                onNext = onNext,
                                onPrev = onPrev
                            )
                        }
                    }
                }
            ) { padding ->
                Box(modifier = Modifier.padding(padding).fillMaxSize()) {
                    when (stationsState) {
                        is UiState.Loading -> {
                            CircularProgressIndicator(
                                modifier = Modifier.align(Alignment.Center)
                                    .semantics { contentDescription = "Loading stations, please wait." }
                            )
                        }
                        is UiState.Error -> {
                            Column(
                                modifier = Modifier.align(Alignment.Center).padding(32.dp),
                                horizontalAlignment = Alignment.CenterHorizontally
                            ) {
                                Icon(Icons.Rounded.WifiOff, contentDescription = null,
                                    modifier = Modifier.size(48.dp), tint = MaterialTheme.colorScheme.outline)
                                Spacer(Modifier.height(12.dp))
                                Text(stationsState.message, color = MaterialTheme.colorScheme.outline)
                            }
                        }
                        is UiState.Success -> {
                            if (stationsState.data.isEmpty()) {
                                Text(
                                    "No stations found. Try a different search.",
                                    modifier = Modifier.align(Alignment.Center).padding(32.dp)
                                        .semantics { contentDescription = "No stations found. Try a different search." },
                                    color = MaterialTheme.colorScheme.outline
                                )
                            } else {
                                LazyColumn(contentPadding = PaddingValues(vertical = 8.dp)) {
                                    items(stationsState.data, key = { it.id }) { station ->
                                        StationItem(
                                            station = station,
                                            isPlaying = playerState.station?.id == station.id && playerState.isPlaying,
                                            onClick = { onPlay(station) }
                                        )
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        @Composable
        fun StationItem(station: RadioStation, isPlaying: Boolean, onClick: () -> Unit) {
            Card(
                modifier = Modifier
                    .fillMaxWidth()
                    .padding(horizontal = 12.dp, vertical = 4.dp)
                    .clickable(onClick = onClick)
                    .semantics(mergeDescendants = true) {
                        contentDescription = station.a11yLabel + if (isPlaying) ", currently playing" else ""
                        role = Role.Button
                    },
                colors = CardDefaults.cardColors(
                    containerColor = if (isPlaying)
                        MaterialTheme.colorScheme.primaryContainer
                    else MaterialTheme.colorScheme.surface
                ),
                shape = RoundedCornerShape(16.dp),
                elevation = CardDefaults.cardElevation(defaultElevation = if (isPlaying) 4.dp else 1.dp)
            ) {
                Row(
                    modifier = Modifier.padding(12.dp),
                    verticalAlignment = Alignment.CenterVertically
                ) {
                    // Station logo
                    Box(
                        modifier = Modifier.size(52.dp).clip(RoundedCornerShape(12.dp))
                            .background(MaterialTheme.colorScheme.surfaceVariant),
                        contentAlignment = Alignment.Center
                    ) {
                        if (!station.faviconUrl.isNullOrBlank()) {
                            AsyncImage(
                                model = ImageRequest.Builder(LocalContext.current)
                                    .data(station.faviconUrl).crossfade(true).build(),
                                contentDescription = null,
                                modifier = Modifier.fillMaxSize(),
                                contentScale = ContentScale.Crop
                            )
                        } else {
                            Icon(Icons.Rounded.Radio, contentDescription = null,
                                tint = MaterialTheme.colorScheme.primary, modifier = Modifier.size(28.dp))
                        }
                        if (isPlaying) {
                            WaveformIndicator(modifier = Modifier.fillMaxSize())
                        }
                    }
                    Spacer(Modifier.width(12.dp))
                    Column(modifier = Modifier.weight(1f)) {
                        Text(
                            text = station.name,
                            style = MaterialTheme.typography.bodyLarge.copy(fontWeight = if (isPlaying) FontWeight.Bold else FontWeight.Normal),
                            maxLines = 1,
                            overflow = TextOverflow.Ellipsis
                        )
                        Spacer(Modifier.height(2.dp))
                        Text(
                            text = listOfNotNull(
                                station.country.takeIf { it.isNotBlank() },
                                station.language.takeIf { it.isNotBlank() },
                                station.displayBitrate.takeIf { it.isNotBlank() }
                            ).joinToString(" · "),
                            style = MaterialTheme.typography.bodySmall,
                            color = MaterialTheme.colorScheme.onSurfaceVariant,
                            maxLines = 1,
                            overflow = TextOverflow.Ellipsis
                        )
                    }
                    if (station.codec.isNotBlank()) {
                        Spacer(Modifier.width(8.dp))
                        Surface(
                            color = MaterialTheme.colorScheme.secondaryContainer,
                            shape = RoundedCornerShape(6.dp)
                        ) {
                            Text(
                                text = station.codec.uppercase(),
                                modifier = Modifier.padding(horizontal = 6.dp, vertical = 2.dp),
                                style = MaterialTheme.typography.labelSmall,
                                color = MaterialTheme.colorScheme.onSecondaryContainer
                            )
                        }
                    }
                }
            }
        }

        @Composable
        fun WaveformIndicator(modifier: Modifier = Modifier) {
            val infiniteTransition = rememberInfiniteTransition(label = "waveform")
            val bars = 4
            Box(modifier = modifier.background(Color.Black.copy(alpha = 0.4f)), contentAlignment = Alignment.Center) {
                Row(horizontalArrangement = Arrangement.spacedBy(2.dp), verticalAlignment = Alignment.CenterVertically) {
                    repeat(bars) { i ->
                        val height by infiniteTransition.animateFloat(
                            initialValue = 4f, targetValue = 16f,
                            animationSpec = infiniteRepeatable(
                                animation = tween(300 + i * 80, easing = LinearEasing),
                                repeatMode = RepeatMode.Reverse
                            ), label = "bar$i"
                        )
                        Box(modifier = Modifier.width(3.dp).height(height.dp).clip(RoundedCornerShape(2.dp))
                            .background(Color.White))
                    }
                }
            }
        }

        @Composable
        fun NowPlayingBar(state: PlayerState, onTogglePause: () -> Unit, onNext: () -> Unit, onPrev: () -> Unit) {
            val station = state.station ?: return
            Surface(
                modifier = Modifier.fillMaxWidth(),
                color = MaterialTheme.colorScheme.surfaceColorAtElevation(8.dp),
                shadowElevation = 8.dp
            ) {
                Row(
                    modifier = Modifier.padding(horizontal = 16.dp, vertical = 12.dp)
                        .semantics { contentDescription = "Now playing: ${station.a11yLabel}" },
                    verticalAlignment = Alignment.CenterVertically
                ) {
                    Box(
                        modifier = Modifier.size(48.dp).clip(RoundedCornerShape(10.dp))
                            .background(MaterialTheme.colorScheme.primaryContainer),
                        contentAlignment = Alignment.Center
                    ) {
                        if (!station.faviconUrl.isNullOrBlank()) {
                            AsyncImage(
                                model = ImageRequest.Builder(LocalContext.current)
                                    .data(station.faviconUrl).crossfade(true).build(),
                                contentDescription = null,
                                modifier = Modifier.fillMaxSize(),
                                contentScale = ContentScale.Crop
                            )
                        } else {
                            Icon(Icons.Rounded.Radio, contentDescription = null,
                                tint = MaterialTheme.colorScheme.primary)
                        }
                        if (state.isPlaying) WaveformIndicator(modifier = Modifier.fillMaxSize())
                    }
                    Spacer(Modifier.width(12.dp))
                    Column(modifier = Modifier.weight(1f)) {
                        Text(station.name, fontWeight = FontWeight.SemiBold, maxLines = 1,
                            overflow = TextOverflow.Ellipsis)
                        Text(
                            text = if (state.isLoading) "Connecting…"
                                   else if (state.error != null) "Stream error"
                                   else "${station.country} · ${station.language}".trim(' ', '·', ' '),
                            style = MaterialTheme.typography.bodySmall,
                            color = MaterialTheme.colorScheme.onSurfaceVariant,
                            maxLines = 1
                        )
                    }
                    // Controls
                    IconButton(onClick = onPrev,
                        modifier = Modifier.semantics { contentDescription = "Previous station" }) {
                        Icon(Icons.Rounded.SkipPrevious, contentDescription = null)
                    }
                    FilledIconButton(
                        onClick = onTogglePause,
                        modifier = Modifier.size(48.dp)
                            .semantics { contentDescription = if (state.isPlaying) "Pause" else "Play" }
                    ) {
                        if (state.isLoading) {
                            CircularProgressIndicator(modifier = Modifier.size(20.dp), strokeWidth = 2.dp,
                                color = MaterialTheme.colorScheme.onPrimary)
                        } else {
                            Icon(
                                if (state.isPlaying) Icons.Rounded.Pause else Icons.Rounded.PlayArrow,
                                contentDescription = null
                            )
                        }
                    }
                    IconButton(onClick = onNext,
                        modifier = Modifier.semantics { contentDescription = "Next station" }) {
                        Icon(Icons.Rounded.SkipNext, contentDescription = null)
                    }
                }
            }
        }
    ''').lstrip('\n'))

    # ── CountryScreen ─────────────────────────────────────────────────────
    w(f"{S}/ui/screen/CountryScreen.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio.ui.screen
        import androidx.compose.foundation.clickable
        import androidx.compose.foundation.layout.*
        import androidx.compose.foundation.lazy.LazyColumn
        import androidx.compose.foundation.lazy.items
        import androidx.compose.foundation.shape.RoundedCornerShape
        import androidx.compose.material.icons.Icons
        import androidx.compose.material.icons.rounded.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Alignment
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.semantics.*
        import androidx.compose.ui.text.font.FontWeight
        import androidx.compose.ui.unit.dp
        import com.nareshkushmi.nkradio.model.Country

        @OptIn(ExperimentalMaterial3Api::class)
        @Composable
        fun CountryScreen(
            countries: List<Country>,
            onFilter: (String) -> Unit,
            onSelect: (Country?) -> Unit,
            onBack: () -> Unit
        ) {
            var query by remember { mutableStateOf("") }

            Scaffold(
                topBar = {
                    TopAppBar(
                        title = { Text("Select Country", fontWeight = FontWeight.Bold) },
                        navigationIcon = {
                            IconButton(onClick = onBack,
                                modifier = Modifier.semantics { contentDescription = "Go back" }) {
                                Icon(Icons.Rounded.ArrowBack, contentDescription = null)
                            }
                        }
                    )
                }
            ) { padding ->
                Column(modifier = Modifier.padding(padding).fillMaxSize()) {
                    // Search
                    OutlinedTextField(
                        value = query,
                        onValueChange = { query = it; onFilter(it) },
                        placeholder = { Text("Search countries…") },
                        leadingIcon = { Icon(Icons.Rounded.Search, contentDescription = null) },
                        trailingIcon = {
                            if (query.isNotEmpty()) {
                                IconButton(onClick = { query = ""; onFilter("") }) {
                                    Icon(Icons.Rounded.Close, contentDescription = "Clear")
                                }
                            }
                        },
                        shape = RoundedCornerShape(28.dp),
                        modifier = Modifier.fillMaxWidth().padding(horizontal = 16.dp, vertical = 8.dp)
                            .semantics { contentDescription = "Search countries by name" },
                        singleLine = true
                    )
                    // All countries option
                    ListItem(
                        headlineContent = { Text("All Countries", fontWeight = FontWeight.Medium) },
                        leadingContent = { Icon(Icons.Rounded.Public, contentDescription = null) },
                        modifier = Modifier.clickable { onSelect(null) }
                            .semantics { contentDescription = "Show stations from all countries" }
                    )
                    HorizontalDivider()
                    // Country list
                    if (countries.isEmpty()) {
                        Box(modifier = Modifier.fillMaxSize(), contentAlignment = Alignment.Center) {
                            Text("No countries found",
                                modifier = Modifier.semantics { contentDescription = "No countries found for your search" },
                                color = MaterialTheme.colorScheme.outline)
                        }
                    } else {
                        LazyColumn {
                            items(countries, key = { it.code }) { country ->
                                ListItem(
                                    headlineContent = { Text(country.name) },
                                    supportingContent = { Text("${country.stationCount} stations") },
                                    trailingContent = { Icon(Icons.Rounded.ChevronRight, contentDescription = null) },
                                    modifier = Modifier.clickable { onSelect(country) }
                                        .semantics(mergeDescendants = true) {
                                            contentDescription = country.a11yLabel
                                            role = Role.Button
                                        }
                                )
                                HorizontalDivider(modifier = Modifier.padding(horizontal = 16.dp))
                            }
                        }
                    }
                }
            }
        }
    ''').lstrip('\n'))

    # ── Navigation ────────────────────────────────────────────────────────
    w(f"{S}/ui/nav/NavGraph.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio.ui.nav
        import androidx.compose.animation.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.platform.LocalContext
        import androidx.lifecycle.compose.collectAsStateWithLifecycle
        import androidx.lifecycle.viewmodel.compose.viewModel
        import androidx.navigation.compose.NavHost
        import androidx.navigation.compose.composable
        import androidx.navigation.compose.rememberNavController
        import com.nareshkushmi.nkradio.ui.screen.CountryScreen
        import com.nareshkushmi.nkradio.ui.screen.HomeScreen
        import com.nareshkushmi.nkradio.viewmodel.RadioViewModel

        @OptIn(ExperimentalAnimationApi::class)
        @Composable
        fun NKRadioNavGraph() {
            val navController = rememberNavController()
            val vm: RadioViewModel = viewModel()

            val stations by vm.stations.collectAsStateWithLifecycle()
            val player by vm.player.collectAsStateWithLifecycle()
            val selectedCountry by vm.selectedCountry.collectAsStateWithLifecycle()
            val filteredCountries by vm.filteredCountries.collectAsStateWithLifecycle()

            NavHost(navController = navController, startDestination = "home") {
                composable("home",
                    enterTransition = { slideInHorizontally { -it } },
                    exitTransition = { slideOutHorizontally { -it } }
                ) {
                    HomeScreen(
                        stationsState = stations,
                        playerState = player,
                        selectedCountry = selectedCountry,
                        onSearch = vm::search,
                        onSelectCountry = { navController.navigate("country") },
                        onPlay = vm::play,
                        onTogglePause = vm::togglePause,
                        onNext = vm::next,
                        onPrev = vm::prev
                    )
                }
                composable("country",
                    enterTransition = { slideInHorizontally { it } },
                    exitTransition = { slideOutHorizontally { it } }
                ) {
                    CountryScreen(
                        countries = filteredCountries,
                        onFilter = vm::filterCountries,
                        onSelect = { country ->
                            vm.selectCountry(country)
                            navController.popBackStack()
                        },
                        onBack = { navController.popBackStack() }
                    )
                }
            }
        }
    ''').lstrip('\n'))

    # ── MainActivity ──────────────────────────────────────────────────────
    w(f"{S}/MainActivity.kt", textwrap.dedent('''
        package com.nareshkushmi.nkradio
        import android.Manifest
        import android.content.Intent
        import android.os.Build
        import android.os.Bundle
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.core.view.WindowCompat
        import com.nareshkushmi.nkradio.service.RadioService
        import com.nareshkushmi.nkradio.ui.nav.NKRadioNavGraph
        import com.nareshkushmi.nkradio.ui.theme.NKRadioTheme

        class MainActivity : ComponentActivity() {
            private val notifPermission = registerForActivityResult(
                ActivityResultContracts.RequestPermission()
            ) {}

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                WindowCompat.setDecorFitsSystemWindows(window, false)

                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                    notifPermission.launch(Manifest.permission.POST_NOTIFICATIONS)
                }

                startService(Intent(this, RadioService::class.java))

                setContent {
                    NKRadioTheme {
                        NKRadioNavGraph()
                    }
                }
            }
        }
    ''').lstrip('\n'))

    # ── Values ────────────────────────────────────────────────────────────
    w(f"{X}/values/strings.xml", """<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">NK Radio</string>
</resources>""")

    w(f"{X}/values/themes.xml", """<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="Theme.NKRadio" parent="android:Theme.Material.Light.NoActionBar">
        <item name="android:windowBackground">@android:color/white</item>
    </style>
</resources>""")

    # ── Launcher icons (vector) ───────────────────────────────────────────
    launcher = ('<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android"'
        ' android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">'
        '<path android:fillColor="#1A73E8" android:pathData="M0,0h108v108H0z"/>'
        '<path android:fillColor="#FFFFFF" android:pathData="M54,26c-15.46,0-28,12.54-28,28s12.54,28 28,28'
        ' 28,-12.54 28,-28S69.46,26 54,26zM54,70c-8.84,0-16-7.16-16-16s7.16-16 16-16 16,7.16 16,16-7.16,16-16,16z"/>'
        '<circle android:fillColor="#FFFFFF" android:cx="54" android:cy="54" android:r="6"/>'
        '</vector>')
    for density in ["mipmap-mdpi","mipmap-hdpi","mipmap-xhdpi","mipmap-xxhdpi","mipmap-xxxhdpi"]:
        w(f"{X}/{density}/ic_launcher.xml", launcher)
        w(f"{X}/{density}/ic_launcher_round.xml", launcher)

    print("\n✅ NK Radio project generated successfully!")
    print(f"   Package: com.nareshkushmi.nkradio")
    print(f"   Version: 1.0.0 (code 1)")
    print(f"   Tech: Kotlin + Jetpack Compose + Material You + Media3")

jobs:
  # ════════════════════════════════════════════════════════
  # JOB 1 — DEBUG APK  (every push / PR)
  # ════════════════════════════════════════════════════════
  build-debug:
    name: Generate NK Radio & Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Generate full Android project
        run: echo "$GENERATE_SCRIPT" | python3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Gradle wrapper
        working-directory: NKRadio
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('NKRadio/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: NKRadio
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NKRadio-debug-${{ github.run_number }}
          path: NKRadio/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ════════════════════════════════════════════════════════
  # JOB 2 — RELEASE APK  (main branch push only)
  # ════════════════════════════════════════════════════════
  build-release:
    name: Generate NK Radio & Build Release APK
    runs-on: ubuntu-latest
    needs: build-debug
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Generate full Android project
        run: echo "$GENERATE_SCRIPT" | python3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Gradle wrapper
        working-directory: NKRadio
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('NKRadio/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Release APK
        working-directory: NKRadio
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: NKRadio/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NKRadio-release-${{ github.run_number }}
          path: NKRadio/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NKRadio/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
